<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Prune to Page</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: var(
          --ls-font-family,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif
        );
      }
      #backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 18vh;
      }
      #modal {
        background: var(--ls-primary-background-color, #fff);
        color: var(--ls-primary-text-color, #222);
        border: 1px solid var(--ls-border-color, #ddd);
        border-radius: 8px;
        width: 520px;
        max-width: 92vw;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }
      #search {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: none;
        outline: none;
        background: transparent;
        color: inherit;
        box-sizing: border-box;
      }
      #results {
        max-height: 320px;
        overflow-y: auto;
        border-top: 1px solid var(--ls-border-color, #e5e5e5);
      }
      .result {
        padding: 10px 16px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .result.selected {
        background: var(--ls-tertiary-background-color, #eef);
      }
      .result .badge {
        font-size: 11px;
        opacity: 0.6;
        margin-left: auto;
      }
      .hint {
        padding: 8px 16px;
        font-size: 12px;
        opacity: 0.6;
        border-top: 1px solid var(--ls-border-color, #e5e5e5);
        background: var(--ls-secondary-background-color, #fafafa);
      }
      .header {
        padding: 10px 16px 4px;
        font-size: 12px;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <div id="backdrop">
      <div id="modal">
        <div class="header" id="header">Move blocks to page</div>
        <input id="search" placeholder="Type a page name…" autocomplete="off" />
        <div id="results"></div>
        <div class="hint">↑↓ navigate · Enter select · Esc cancel</div>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
